name: Build Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Override release version (e.g. 4.7.2). Leave empty to use semantic-release.'
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  github-release:
    name: Github Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: oven-sh/setup-bun@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@trustwallet'
      - name: Generate version
        id: get-next-version
        run: |
          bun install --frozen-lockfile
          bun run build:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve release version
        id: resolve-version
        run: |
          override="${{ inputs.version }}"
          auto="${{ steps.get-next-version.outputs.new-release-version }}"
          version="${override:-$auto}"
          if [ -z "$version" ]; then
            echo "::error::No release version available. Provide the 'version' input or push commits that trigger semantic-release."
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Set output
        id: vars
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT
      - name: build packages
        run: |
          bun install
          bun run build:packages
          bun run test
          bun run rename ${{ steps.resolve-version.outputs.version }}
          bun run publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        id: create_release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.resolve-version.outputs.version }}
          release_name: Release ${{ steps.resolve-version.outputs.version }}
          body: |
            New Release 🚀
          draft: false
          prerelease: false
permissions:
  actions: write
  contents: write
  deployments: write
  packages: write
